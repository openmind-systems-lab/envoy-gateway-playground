apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-v1
  labels:
    app.kubernetes.io/name: app-v1
    app.kubernetes.io/part-of: envoy-gateway-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-v1
  template:
    metadata:
      labels:
        app: app-v1
    spec:
      containers:
      - name: echo
        image: hashicorp/http-echo:1.0
        args:
        - "-text=hello from app v1"
        ports:
        - containerPort: 5678
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-v2
  labels:
    app.kubernetes.io/name: app-v2
    app.kubernetes.io/part-of: envoy-gateway-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-v2
  template:
    metadata:
      labels:
        app: app-v2
    spec:
      containers:
      - name: echo
        image: hashicorp/http-echo:1.0
        args:
        - "-text=hello from app v2"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: app-v1
  labels:
    app.kubernetes.io/name: app-v1
    app.kubernetes.io/part-of: envoy-gateway-poc
spec:
  selector:
    app: app-v1
  ports:
  - name: http
    port: 80
    targetPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: app-v2
  labels:
    app.kubernetes.io/name: app-v2
    app.kubernetes.io/part-of: envoy-gateway-poc
spec:
  selector:
    app: app-v2
  ports:
  - name: http
    port: 80
    targetPort: 5678
